# Example Active Directory configuration
# Replace with your actual AD server details

# Basic LDAP configuration
ldap:
  # AD server URL and port
  url: ldap://your-ad-server.domain.com:389
  # Base DN for LDAP operations
  base: dc=yourdomain,dc=com
  # Service account credentials (optional for anonymous bind)
  username: ldapservice@yourdomain.com
  password: ${LDAP_PASSWORD:your-service-password}
  
  user:
    # Base DN for user searches (will be auto-constructed from domain if empty)
    search-base: cn=Users,dc=yourdomain,dc=com
    # LDAP filter for user searches (sAMAccountName is standard for AD)
    search-filter: (sAMAccountName={0})

# Server configuration
server:
  port: 8080

# Logging
logging:
  level:
    com.example.ssoldap: INFO
    org.springframework.ldap: INFO
    org.springframework.security: INFO