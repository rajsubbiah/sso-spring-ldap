# Test Application Configuration
server.port=0
spring.profiles.active=test

# Disable LDAP auto-configuration for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.ldap.LdapAutoConfiguration,org.springframework.boot.autoconfigure.ldap.embedded.EmbeddedLdapAutoConfiguration

# Logging configuration
logging.level.org.springframework.security=INFO
logging.level.org.springframework.ldap=INFO
logging.level.com.example.ssoldap=DEBUG

# LDAP Configuration (Test values - will not work without real AD)
ldap.url=ldap://test-domain-controller:389
ldap.base=DC=test,DC=com
ldap.username=cn=test-service,ou=Service Accounts,dc=test,dc=com
ldap.password=test-password
ldap.user-dn-pattern=uid={0},ou=people
ldap.user-search-base=ou=people
ldap.user-search-filter=(&(objectClass=person)(uid={0}))
ldap.group-search-base=ou=groups
ldap.group-search-filter=member={0}

# Active Directory Configuration (Test values)
ad.domain=test.com
ad.url=ldap://test-domain-controller:389
ad.root-dn=DC=test,DC=com
ad.user-search-filter=(&(objectClass=user)(sAMAccountName={0}))

# Admin Groups (comma-separated list of group names that should get ROLE_ADMIN)
app.admin-groups=Test Admins,Application Admins

# Application Configuration
app.title=Corporate SSO Portal (Test)
app.logo-text=TestCompany