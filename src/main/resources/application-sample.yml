# Sample configuration for Active Directory integration
# Copy this to application.yml and modify according to your AD environment

# Example 1: Basic Active Directory Configuration
ldap:
  url: ldap://dc01.company.com:389
  base: dc=company,dc=com
  username: ldapservice@company.com
  password: ${LDAP_PASSWORD:your-service-password}
  
  user:
    search-base: cn=Users,dc=company,dc=com
    search-filter: (sAMAccountName={0})

