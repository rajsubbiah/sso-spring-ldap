<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appTitle}">Corporate SSO Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <a th:href="@{/}" class="logo" th:text="${logoText}">MyCompany</a>
            <h1 class="app-title" th:text="${appTitle}">Corporate SSO Portal</h1>
            <div class="user-info" sec:authorize="isAuthenticated()">
                <span class="user-name" th:text="${displayName ?: 'Unknown User'}">User Name</span>
                <a th:href="@{/logout}" class="logout-btn">Logout</a>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="nav" sec:authorize="isAuthenticated()">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a th:href="@{/}" class="nav-link" th:classappend="${#httpServletRequest.requestURI == '/' ? 'active' : ''}">Home</a></li>
                <li><a th:href="@{/profile}" class="nav-link" th:classappend="${#httpServletRequest.requestURI == '/profile' ? 'active' : ''}">Profile</a></li>
                <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin}" class="nav-link" th:classappend="${#httpServletRequest.requestURI == '/admin' ? 'active' : ''}">Admin</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div th:fragment="content">
            <!-- Content will be replaced by specific templates -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 <span th:text="${logoText}">MyCompany</span>. All rights reserved.</p>
            <p>Secure Single Sign-On Portal</p>
        </div>
    </footer>
</body>
</html>
