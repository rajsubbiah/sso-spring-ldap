# Active Directory / LDAP Configuration
ldap:
  # LDAP server URL (modify for your AD server)
  url: ldap://your-ad-server.domain.com:389
  # Base DN for LDAP searches
  base: dc=domain,dc=com
  # Service account credentials (optional for anonymous bind)
  username: 
  password: 
  
  user:
    # Search base for user queries (optional, will be constructed from domain if empty)
    search-base: cn=Users,dc=domain,dc=com
    # Search filter for finding users (sAMAccountName is standard for AD)
    search-filter: (sAMAccountName={0})

# Server configuration
server:
  port: 8080
  servlet:
    context-path: /

# Logging configuration
logging:
  level:
    com.example.ssoldap: INFO
    org.springframework.ldap: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Spring configuration
spring:
  application:
    name: sso-spring-ldap
  
  # Jackson configuration for JSON responses
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: true