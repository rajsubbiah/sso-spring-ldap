version: '3.8'

services:
  # OpenLDAP server for testing
  openldap:
    image: osixia/openldap:1.5.0
    container_name: ldap-server
    environment:
      LDAP_LOG_LEVEL: "256"
      LDAP_ORGANISATION: "Test Company"
      LDAP_DOMAIN: "test.com"
      LDAP_BASE_DN: "dc=test,dc=com"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_CONFIG_PASSWORD: "config"
      LDAP_READONLY_USER: false
      LDAP_RFC2307BIS_SCHEMA: false
      LDAP_BACKEND: "mdb"
      LDAP_TLS: true
      LDAP_TLS_CRT_FILENAME: "ldap.crt"
      LDAP_TLS_KEY_FILENAME: "ldap.key"
      LDAP_TLS_DH_PARAM_FILENAME: "dhparam.pem"
      LDAP_TLS_CA_CRT_FILENAME: "ca.crt"
      LDAP_TLS_ENFORCE: false
      LDAP_TLS_CIPHER_SUITE: "SECURE256:-VERS-SSL3.0"
      LDAP_TLS_VERIFY_CLIENT: "demand"
      LDAP_REPLICATION: false
      KEEP_EXISTING_CONFIG: false
      LDAP_REMOVE_CONFIG_AFTER_SETUP: true
      LDAP_SSL_HELPER_PREFIX: "ldap"
    tty: true
    stdin_open: true
    volumes:
      - ./ldap/database:/var/lib/ldap
      - ./ldap/config:/etc/ldap/slapd.d
    ports:
      - "389:389"
      - "636:636"
    domainname: "test.com"
    hostname: "ldap-server"
    
  # LDAP Admin interface (optional)
  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: false
    ports:
      - "8081:80"
    depends_on:
      - openldap

  # Spring Boot application
  sso-spring-ldap:
    build: .
    container_name: sso-spring-ldap-app
    environment:
      LDAP_URL: "ldap://openldap:389"
      LDAP_BASE: "dc=test,dc=com"
      LDAP_USERNAME: ""
      LDAP_PASSWORD: ""
    ports:
      - "8080:8080"
    depends_on:
      - openldap
    volumes:
      - ./application-docker.yml:/app/application.yml:ro